    <div class="site-footer__grid">
      <div class="site-footer__col" *ngFor="let column of columns">
        <div class="site-footer__group" *ngFor="let group of column">
          <button
            type="button"
            class="site-footer__group-toggle"
            [attr.aria-expanded]="isExpanded(group.id)"
            [attr.aria-controls]="'footer-group-' + group.id"
            (click)="toggleGroup(group.id)"
          >
            <h4>{{ group.title }}</h4>
            <span class="site-footer__chevron" [class.site-footer__chevron--open]="isExpanded(group.id)">+</span>
          </button>

          <div
            class="site-footer__group-links"
            [id]="'footer-group-' + group.id"
            [class.site-footer__group-links--open]="isExpanded(group.id)"
          >
            <a
              *ngFor="let link of group.links"
              [href]="link.href"
              [attr.target]="isCareersLink(link.href) ? '_blank' : null"
              [attr.rel]="isCareersLink(link.href) ? 'noopener noreferrer' : null"
              (click)="onFooterLinkClick($event, link.href)"
            >{{ link.label }}</a>
          </div>
        </div>
      </div>
    </div>

    <div class="site-footer__locations" aria-label="Company office locations">
      <h4>Our Locations</h4>
      <p>Click any location to copy the address and open it in Google Maps.</p>
      <div class="site-footer__locations-list">
        <button type="button" *ngFor="let location of locations" (click)="openLocation(location)">
          <span class="site-footer__location-title">{{ location.title }}</span>
          <span class="site-footer__location-address">{{ location.address }}</span>
        </button>
      </div>
    </div>

    <div class="site-footer__bottom">
      <p>&copy; 2026 CES. All rights reserved.</p>
      <div class="site-footer__bottom-links">
        <a href="/company-profile" (click)="onFooterLinkClick($event, '/company-profile')">Legal</a>
        <a href="/company-profile" (click)="onFooterLinkClick($event, '/company-profile')">Privacy Policy</a>
        <a href="/contact-us" (click)="onFooterLinkClick($event, '/contact-us')">Manage Cookie Preferences</a>
      </div>
    </div>
  </div>
</footer>
