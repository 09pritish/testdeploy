<svg viewBox="0 0 1100 552" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <filter id="glo">
                <feGaussianBlur stdDeviation="14" result="b" />
                <feMerge>
                  <feMergeNode in="b" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
              <filter id="glm">
